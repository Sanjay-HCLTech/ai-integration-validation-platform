<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Unified Execution Console</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #5d6b78;
      --line: #d7dde3;
      --blue: #1f6feb;
      --green: #167a3a;
      --red: #b42318;
      --amber: #9a6700;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    header {
      background: #202a33;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    main {
      padding: 16px 24px 28px;
      display: grid;
      gap: 14px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
    }

    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .metric {
      padding: 10px 12px;
      min-height: 62px;
    }

    .metric span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 7px;
    }

    .metric strong {
      font-size: 22px;
      line-height: 1;
    }

    .panel {
      padding: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 120px 180px 180px 220px 160px 1fr;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select, input {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 6px 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    select[multiple] {
      min-height: 92px;
    }

    .checks {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      padding-bottom: 6px;
    }

    .checks label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-weight: 400;
      font-size: 13px;
    }

    .checks input {
      width: 16px;
      min-height: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
    }

    button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      color: var(--muted);
      margin-left: auto;
      align-self: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: #eef2f6;
      color: #354250;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .badge {
      display: inline-block;
      min-width: 52px;
      text-align: center;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
      font-weight: 700;
    }

    .pass { background: #daf5e4; color: var(--green); }
    .fail { background: #ffe1dc; color: var(--red); }
    .pending { background: #fff2c2; color: var(--amber); }

    .detail {
      background: #fbfcfd;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      white-space: normal;
    }

    .detail h3 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #26313c;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 16px;
    }

    .history-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    @media (max-width: 980px) {
      .summary { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .controls { grid-template-columns: 1fr 1fr; }
      .detail { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Unified Execution Console</h1>
    <div>IVP Single Pane</div>
  </header>

  <main>
    <section class="summary">
      <div class="metric"><span>Execution ID</span><strong id="executionId">-</strong></div>
      <div class="metric"><span>Total</span><strong id="total">0</strong></div>
      <div class="metric"><span>Pass</span><strong id="pass">0</strong></div>
      <div class="metric"><span>Fail</span><strong id="fail">0</strong></div>
      <div class="metric"><span>Duration</span><strong id="duration">0ms</strong></div>
      <div class="metric"><span>Success Rate</span><strong id="rate">0%</strong></div>
    </section>

    <section class="panel">
      <div class="controls">
        <label>Environment
          <select id="env">
            <option>ST5</option>
            <option>ST3</option>
            <option>SIT</option>
          </select>
        </label>

        <label>Flow Types
          <select id="flows" multiple>
            <option selected>JMS</option>
            <option selected>RABBIT</option>
            <option>KAFKA</option>
            <option>REST</option>
            <option>SOAP</option>
          </select>
        </label>

        <label>Systems
          <select id="systems" multiple>
            <option selected>DMS</option>
            <option>SAP</option>
            <option>AO</option>
            <option>TDA</option>
            <option>GIP</option>
            <option>C4C</option>
          </select>
        </label>

        <label>Services
          <select id="services" multiple>
            <option selected>BookingDetails</option>
            <option>SubscribeBookingDetails</option>
            <option>AccomOffers</option>
            <option>FlightOffers</option>
            <option>PackageOffer</option>
            <option>CruiseOffers</option>
            <option>DisplayBooking_v3</option>
            <option>InfoBooking_v3</option>
            <option>CreateBooking_v3</option>
            <option>ReservationEvent_v3</option>
          </select>
        </label>

        <label>Payload Mode
          <select id="payloadMode">
            <option>AUTO</option>
            <option>MANUAL</option>
          </select>
        </label>

        <label>Booking ID
          <input id="bookingId" value="31835146" placeholder="31835146">
        </label>
      </div>

      <div class="actions">
        <button class="primary" id="run">Run</button>
        <button id="stop" disabled>Stop</button>
        <button id="rerun" disabled>Re-run Failed</button>
        <button id="download" disabled>Download Logs</button>
        <button id="export" disabled>Export Report</button>
        <div class="checks">
          <label><input id="runAll" type="checkbox"> Run All Services</label>
          <label><input id="parallel" type="checkbox" checked> Parallel Execution</label>
          <label><input id="trace" type="checkbox" checked> Trace Enabled</label>
        </div>
        <div class="status" id="status">Ready</div>
      </div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>Recent Runs</h2>
        <button id="refreshHistory">Refresh</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Execution ID</th>
              <th>Created</th>
              <th>Status</th>
              <th>Total</th>
              <th>Pass</th>
              <th>Fail</th>
              <th>Success</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="history">
            <tr><td colspan="8">No recent runs yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Service</th>
            <th>Flow</th>
            <th>System</th>
            <th>Env</th>
            <th>Status</th>
            <th>BookingID</th>
            <th>CorrID</th>
            <th>JobID</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="results">
          <tr><td colspan="10">No executions yet.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let lastRequest = null;
    let lastResponse = null;
    let activeController = null;
    let currentExecutionId = null;

    function selected(id) {
      return Array.from($(id).selectedOptions).map(option => option.value);
    }

    function requestBody() {
      return {
        executionId: newExecutionId(),
        env: $("env").value,
        systems: selected("systems"),
        flowTypes: selected("flows"),
        services: selected("services"),
        payloadMode: $("payloadMode").value,
        bookingId: $("bookingId").value,
        runAllServices: $("runAll").checked,
        parallel: $("parallel").checked,
        traceEnabled: $("trace").checked
      };
    }

    function singleRowRequest(row) {
      return {
        ...lastRequest,
        executionId: newExecutionId(),
        env: row.env,
        systems: [row.system],
        flowTypes: [row.flow],
        services: [row.service],
        runAllServices: false
      };
    }

    function newExecutionId() {
      if (window.crypto && window.crypto.randomUUID) {
        return window.crypto.randomUUID();
      }
      return `exec-${Date.now()}-${Math.floor(Math.random() * 100000)}`;
    }

    function setBusy(isBusy) {
      $("run").disabled = isBusy;
      $("stop").disabled = !isBusy;
      setActionState();
    }

    function setActionState() {
      const hasRows = Boolean(lastResponse?.rows?.length);
      const hasFailed = Boolean(lastResponse?.rows?.some(row => (row.status || "").toUpperCase() === "FAIL"));
      $("rerun").disabled = Boolean(activeController) || !hasFailed;
      $("download").disabled = Boolean(activeController) || !hasRows;
      $("export").disabled = Boolean(activeController) || !hasRows;
    }

    function setSummary(summary) {
      $("total").textContent = summary?.total ?? 0;
      $("pass").textContent = summary?.pass ?? 0;
      $("fail").textContent = summary?.fail ?? 0;
      $("duration").textContent = `${summary?.durationMs ?? 0}ms`;
      $("rate").textContent = `${summary?.successRate ?? 0}%`;
    }

    function setExecutionId(value) {
      currentExecutionId = value || null;
      $("executionId").textContent = value ? value.substring(0, 8) : "-";
      $("executionId").title = value || "";
    }

    function shortId(value) {
      return value ? value.substring(0, 8) : "NA";
    }

    function badge(status) {
      const normalized = (status || "NA").toUpperCase();
      const cls = normalized === "PASS" ? "pass" : normalized === "FAIL" ? "fail" : "pending";
      return `<span class="badge ${cls}">${normalized}</span>`;
    }

    function text(value) {
      return String(value ?? "NA")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function lines(values) {
      return text((values || []).join("\n"));
    }

    function renderRows(rows) {
      const tbody = $("results");
      tbody.innerHTML = "";
      if (!rows || rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10">No results returned.</td></tr>';
        return;
      }

      rows.forEach((row, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><button data-index="${index}" aria-label="Toggle details">+</button></td>
          <td>${text(row.service)}</td>
          <td>${text(row.flow)}</td>
          <td>${text(row.system)}</td>
          <td>${text(row.env)}</td>
          <td>${badge(row.status)}</td>
          <td>${text(row.bookingId)}</td>
          <td>${text(row.corrId)}</td>
          <td>${text(row.jobId)}</td>
          <td>${row.timeMs || 0}ms</td>
        `;
        tbody.appendChild(tr);

        const detail = document.createElement("tr");
        detail.hidden = true;
        detail.innerHTML = `
          <td colspan="10">
            <div class="detail">
              <section><h3>[TRACE]</h3><pre>${lines(row.trace)}</pre></section>
              <section><h3>[ASSERT]</h3><pre>${lines(row.assertions)}</pre></section>
              <section><h3>[TIMELINE]</h3><pre>${lines(row.timeline)}</pre></section>
            </div>
          </td>
        `;
        tbody.appendChild(detail);

        tr.querySelector("button").addEventListener("click", (event) => {
          const expanded = !detail.hidden;
          detail.hidden = expanded;
          event.target.textContent = expanded ? "+" : "-";
        });
      });
    }

    async function executeRequest(body, statusText) {
      body.executionId = body.executionId || newExecutionId();
      setExecutionId(body.executionId);
      activeController = new AbortController();
      setBusy(true);
      $("status").textContent = "Running...";
      try {
        const response = await fetch("/execute/executeAll", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: activeController.signal
        });
        if (!response.ok) {
          throw new Error(await response.text());
        }
        const data = await response.json();
        lastRequest = body;
        lastResponse = data;
        setExecutionId(data.executionId || body.executionId);
        setSummary(data.summary);
        renderRows(data.rows);
        $("status").textContent = statusText || "Complete";
        await refreshHistory().catch(() => {});
        return data;
      } catch (error) {
        $("status").textContent = error.name === "AbortError" ? "Stopped" : `Failed: ${error.message}`;
        throw error;
      } finally {
        activeController = null;
        setBusy(false);
      }
    }

    function mergeResponses(responses) {
      const rows = responses.flatMap(response => response.rows || []);
      const total = rows.length;
      const pass = rows.filter(row => (row.status || "").toUpperCase() === "PASS").length;
      const durationMs = responses.reduce((sum, response) => sum + (response.summary?.durationMs || 0), 0);
      return {
        summary: {
          total,
          pass,
          fail: total - pass,
          durationMs,
          successRate: total === 0 ? 0 : Math.round((pass * 100) / total)
        },
        rows
      };
    }

    function openDownload(path) {
      if (!currentExecutionId) {
        return;
      }
      window.location.href = `/execute/${currentExecutionId}/${path}`;
    }

    function openHistoryDownload(executionId, path) {
      window.location.href = `/execute/${executionId}/${path}`;
    }

    async function openExecution(executionId) {
      const response = await fetch(`/execute/${executionId}`);
      if (!response.ok) {
        throw new Error(await response.text());
      }
      const data = await response.json();
      lastResponse = data;
      setExecutionId(data.executionId || executionId);
      setSummary(data.summary);
      renderRows(data.rows);
      $("status").textContent = `Opened ${shortId(executionId)}`;
      setActionState();
    }

    function renderHistory(items) {
      const tbody = $("history");
      tbody.innerHTML = "";
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8">No recent runs yet.</td></tr>';
        return;
      }

      items.forEach(item => {
        const executionId = item.executionId || "";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td title="${text(executionId)}">${text(shortId(executionId))}</td>
          <td>${text(item.createdAt)}</td>
          <td>${badge(item.status)}</td>
          <td>${item.total || 0}</td>
          <td>${item.pass || 0}</td>
          <td>${item.fail || 0}</td>
          <td>${item.successRate || 0}%</td>
          <td>
            <div class="history-actions">
              <button data-action="open">Open</button>
              <button data-action="logs">Logs</button>
              <button data-action="report">Report</button>
            </div>
          </td>
        `;
        tr.querySelector('[data-action="open"]').addEventListener("click", () => {
          openExecution(executionId).catch(error => {
            $("status").textContent = `Open failed: ${error.message}`;
          });
        });
        tr.querySelector('[data-action="logs"]').addEventListener("click", () => openHistoryDownload(executionId, "logs"));
        tr.querySelector('[data-action="report"]').addEventListener("click", () => openHistoryDownload(executionId, "report"));
        tbody.appendChild(tr);
      });
    }

    async function refreshHistory() {
      const response = await fetch("/execute/history");
      if (!response.ok) {
        throw new Error(await response.text());
      }
      renderHistory(await response.json());
    }

    $("run").addEventListener("click", async () => {
      await executeRequest(requestBody(), "Complete").catch(() => {});
    });

    $("stop").addEventListener("click", async () => {
      if (currentExecutionId) {
        await fetch(`/execute/${currentExecutionId}/stop`, { method: "POST" }).catch(() => {});
      }
      if (activeController) {
        activeController.abort();
      }
    });

    $("rerun").addEventListener("click", async () => {
      const failedRows = (lastResponse?.rows || [])
        .filter(row => (row.status || "").toUpperCase() === "FAIL");
      if (failedRows.length === 0) {
        return;
      }

      const responses = [];
      for (const row of failedRows) {
        const response = await executeRequest(singleRowRequest(row), `Re-running failed: ${row.service || "NA"}`)
          .catch(() => null);
        if (response) {
          responses.push(response);
        }
      }
      if (responses.length > 0) {
        lastResponse = mergeResponses(responses);
        setSummary(lastResponse.summary);
        renderRows(lastResponse.rows);
        $("status").textContent = "Re-run failed complete";
        setActionState();
        await refreshHistory().catch(() => {});
      }
    });

    $("download").addEventListener("click", () => {
      openDownload("logs");
    });

    $("export").addEventListener("click", () => {
      openDownload("report");
    });

    $("refreshHistory").addEventListener("click", () => {
      refreshHistory().catch(error => {
        $("status").textContent = `History failed: ${error.message}`;
      });
    });

    refreshHistory().catch(() => {});
  </script>
</body>
</html>
