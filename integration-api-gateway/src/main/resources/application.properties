# ================================
# Please Note: "application.properties" needs to be replaced 
# with actual properties file parked aside.
# ================================
# MASTER FEATURE SWITCHES
# ================================
# Single UI/interpreter/report-card control.
# false = hide Smart Prompt, hide Intelligence Report cards, route console runs through /execute/executeAll,
#         disable /intelligence/** endpoints, and use normal /execute/... report/log downloads.
console.intelligence.enabled=true

# External/OpenAI NLP control. API key must come from environment/vault.
intelligence.nlp.enabled=true
intelligence.nlp.provider=OPENAI

# ================================
# OPENAI / AI INTELLIGENCE ENABLED PROFILE - COMMENTED TEMPLATE
# ================================
# Uncomment this block when OpenAI-backed Smart Prompt, intent interpretation,
# Intelligence Report cards, /intelligence/** endpoints, AI replay, and AI report downloads
# should be fully enabled across the Unified Execution Console.
#
#
# Do not expose system prompts, mapping prompts, or internal rules in UI/API responses.


# ================================
# SFTP CONFIG
# ================================
sftp.host=10.xxx.xxx.xx
sftp.port=22
sftp.username=syadav
sftp.password=${:}
sftp.private.key=C:/Users/sanjay_ya/.ssh/id_rsa
sftp.private.key.passphrase=xxxx
sftp.remote.run.as=xxx


# ================================
# LOGS
# ================================
sftp.payload.log.dir=/xx/tibco/tra/domain
local.log.dir=C:/logs
local.log.retention.days=7
sftp.grep.retry.count=3
sftp.grep.retry.wait.ms=10000
sftp.connect.timeout.ms=15000
sftp.command.timeout.ms=20000
sftp.keepalive.interval.ms=30000
sftp.search.modified.within.days=15
sftp.correlation.max.depth=3
sftp.correlation.max.tokens=100
sftp.correlation.token-limit=${sftp.correlation.max.tokens}
sftp.correlation.max.jobids=50
sftp.correlation.max.tokens.per.search=3
sftp.correlation.tokens-per-search=${sftp.correlation.max.tokens.per.search}
sftp.correlation.max.batches.per.depth=3
sftp.block.max.matches.per.file=10
sftp.local.min.block.lines=10
sftp.log.name.filter.enabled=true

# ================================
# REST TRIGGER
# ================================


# ================================
# EXECUTION CONFIG
# ================================
execution.retry.count=3
execution.wait.ms=3000
console.execution.history.limit=25
console.execution.parallel.timeout.ms=60000
console.execution.default.booking-id=31835146

# ================================
# PAYLOAD LOCATION
# ================================
platform.env=ST5
payload.root=C:/payloads

# SOAP / VRP payload lane: C:/payloads/SOAP/<System>
soap.payload.root=${payload.root}/SOAP
soap.payload.system.DMS=DMS
soap.payload.system.SAP=SAP
soap.payload.system.AO=AO
soap.payload.system.TDA=TDA
soap.payload.system.GIP=GIP
soap.payload.system.C4C=C4C

# REST / APIGEE payload lane: C:/payloads/APIGEE/<Collection>
rest.payload.root=${payload.root}/APIGEE
rest.payload.collection.ACCOMOFFERS=ACCOMOFFERS
rest.payload.collection.FLIGHTOFFERS=FLIGHTOFFERS
rest.payload.collection.PACKAGEOFFER=PACKAGEOFFERS
rest.payload.collection.CRUISEOFFERS=CRUISEOFFERS

# JMS / DATAHUB payload lane: C:/payloads/DATAHUB/<System>
jms.payload.root=${payload.root}/DATAHUB
jms.payload.system.DMS=DMS
jms.payload.system.SAP=SAP
jms.payload.system.AO=AO
jms.payload.system.TDA=TDA
jms.payload.system.GIP=GIP
jms.payload.system.C4C=C4C

# RabbitMQ / Nordics payload lane: C:/payloads/NORDICS/<System>
rabbit.payload.root=${payload.root}/NORDICS
rabbit.payload.system.DMS=DMS
rabbit.payload.system.SAP=SAP
rabbit.payload.system.AO=AO
rabbit.payload.system.TDA=TDA
rabbit.payload.system.GIP=GIP
rabbit.payload.system.C4C=C4C

payload.base.dir=regression-payloads/
payload.default.file=datahub/default-booking-update.json
payload.manifest.file=manifest.csv

# ================================
# MULTI-SYSTEM EXECUTION SWITCHES
# ================================
system.jms.enabled=true
system.rest.enabled=true
system.soap.enabled=true
system.rabbitmq.enabled=true
system.kafka.enabled=true
unified.trace.report.enabled=true
platform.report.enabled=false
server.error.whitelabel.enabled=false

# ================================
# KAFKA EXECUTION CONFIG
# ================================
kafka.env=ST5
kafka.system.default=DMS
kafka.simulation.enabled=true
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic.default=integration.events
kafka.consumer.group.default=ivp-simulation-consumer
kafka.message.type.default=DATAHUB_EVENT
kafka.partition=0
kafka.tracking.id=

# ================================
# JMS SIMULATION CONFIG
# ================================
jms.env=ST5
jms.system.default=DMS
jms.provider=simulation
jms.default.async=false
jms.destination.type=QUEUE
jms.destination.ST3.DMS=DATAHUB.ST3.DMS.IN.Q
jms.destination.ST5.DMS=DATAHUB.ST5.DMS.IN.Q
jms.destination.SIT.DMS=DATAHUB.SIT.DMS.IN.Q
jms.destination.ST3.SAP=DATAHUB.ST3.SAP.IN.Q
jms.destination.ST5.SAP=DATAHUB.ST5.SAP.IN.Q
jms.destination.SIT.SAP=DATAHUB.SIT.SAP.IN.Q
jms.destination.ST3.AO=DATAHUB.ST3.AO.IN.Q
jms.destination.ST5.AO=DATAHUB.ST5.AO.IN.Q
jms.destination.SIT.AO=DATAHUB.SIT.AO.IN.Q
jms.destination.ST3.TDA=DATAHUB.ST3.TDA.IN.Q
jms.destination.ST5.TDA=DATAHUB.ST5.TDA.IN.Q
jms.destination.SIT.TDA=DATAHUB.SIT.TDA.IN.Q
jms.destination.ST3.GIP=DATAHUB.ST3.GIP.IN.Q
jms.destination.ST5.GIP=DATAHUB.ST5.GIP.IN.Q
jms.destination.SIT.GIP=DATAHUB.SIT.GIP.IN.Q
jms.destination.ST3.C4C=DATAHUB.ST3.C4C.IN.Q
jms.destination.ST5.C4C=DATAHUB.ST5.C4C.IN.Q
jms.destination.SIT.C4C=DATAHUB.SIT.C4C.IN.Q
jms.message.type=DATAHUB_EVENT
jms.correlation.enabled=true
jms.expected.publish.status=SUCCESS,QUEUED
jms.simulation.consumer.enabled=true
jms.simulation.retry.count=3
jms.simulation.processing.delay.ms=2000
jms.simulation.retry.delay.ms=2000
jms.simulation.log-analyzer.enabled=true

